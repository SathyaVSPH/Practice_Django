{% extends "layout.html" %}

{% block title %}
    {{post.title}} - Post Details
{% endblock %}

{% block heading %}{{ post.title }}{% endblock %}

{% block content %}
    <div class="post-entry">
			<p>----Author: {{ post.author }}</p>
			<p>{{ post.body }}</p>
		</div>
	<br>
	<a href="{% url 'update_post' post.pk %}">➕Edit Post</a>
	<br>
	<a href="{% url 'delete_post' post.pk %}">➖Delete Post</a>
{% endblock %}
